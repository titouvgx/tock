name: Deploy MkDocs
on:
  pull_request:
    types: [closed]
    branches:
      - 1811_mkdocs_documentation_website

permissions:
  contents: write

jobs:
  concurrency:
    group: deploy-${{ github.repository }}
    cancel-in-progress: false

  close_job:
  merge_job:
    runs-on: ubuntu-latest
    steps:
      - name: Get artifact ID from the latest successful run
        id: get_artifact
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Définition du workflow source
            const workflow_id = 'github-actions.yml'; 

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflow_id,
              status: "success",
              per_page: 1
            });

            if (runs.data.total_count === 0) { 
              core.setFailed("No successful runs found");
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runs.data.workflow_runs[0].id
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === "github-pages");

            if (artifact) {
              console.log("Found artifact ID:", artifact.id);

              // Télécharger l'artifact
              const response = await github.rest.actions.downloadArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
                archive_format: 'zip'
              });

              require('fs').writeFileSync("github-pages.zip", Buffer.from(response.data));
              require('child_process').execSync(`unzip -o github-pages.zip -d "/tmp/gh-artifact-extract" && mkdir -p docs/site && tar xvf /tmp/gh-artifact-extract/artifact.tar -C docs/site/`);

              console.log("Artifact downloaded successfully");

              // Supprimer l'ancien artifact après utilisation
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id
              });

              console.log(`Artifact ID ${artifact.id} deleted successfully.`);
            } else {
              core.setFailed("No artifact found");
            }
