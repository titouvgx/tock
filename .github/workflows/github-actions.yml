name: Download Latest Valid Artifact

on:
  push:
    branches:
      - 1811_testpr
      - 1811_mkdocs_documentation_website

jobs:
  download_artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer les artifacts disponibles
        run: |
          # Récupérer les informations sur les artifacts
          ARTIFACT_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.ACTIONS_ARTIFACT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts")
          
          # Afficher la réponse brute pour analyser son contenu
          echo "Contenu brut de la réponse de l'API :"
          echo "$ARTIFACT_RESPONSE"

          # Trouver le dernier artifact valide (non expiré)
          ARTIFACT_URL=$(echo "$ARTIFACT_RESPONSE" | jq -r '.artifacts[] | select(.expired == false) | .archive_download_url' | head -n 1)

          if [ -z "$ARTIFACT_URL" ]; then
            echo "❌ Aucun artifact valide trouvé."
            exit 1
          else
            echo "✅ Artifact valide trouvé ! Téléchargement de l'artifact..."
            curl -L -o github-pages.zip -H "Authorization: token ${{ secrets.ACTIONS_ARTIFACT_TOKEN }}" "$ARTIFACT_URL"
          fi

      - name: Vérifier si le fichier ZIP a été téléchargé
        run: |
          if [ -f "github-pages.zip" ]; then
            echo "✅ Le fichier github-pages.zip a bien été téléchargé."
            ls -lh github-pages.zip
          else
            echo "❌ Aucun fichier github-pages.zip trouvé !"
            exit 1
          fi

      - name: Afficher le contenu de l'archive
        run: |
          unzip -l github-pages.zip  # Liste le contenu du fichier ZIP sans l'extraire
