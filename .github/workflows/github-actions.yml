name: Cleanup & Re-Publish Artifacts

on:
  pull_request:
    types:
      - closed  

jobs:
  cleanup_and_republish:
    runs-on: ubuntu-latest

    steps:
      - name: Définir les variables
        run: |
          echo "BRANCH_NAME=${{ github.head_ref || github.ref_name }}" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=github-pages.zip" >> $GITHUB_ENV

      - name: Récupérer le dernier artifact disponible
        run: |
          ARTIFACT_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts" | \
            jq -r '.artifacts | sort_by(.updated_at) | last | .archive_download_url')

          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" == "null" ]; then
            echo "Aucun artifact trouvé."
            exit 1
          else
            echo "Artifact trouvé : $ARTIFACT_URL"
            curl -L -o github-pages.zip -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$ARTIFACT_URL"
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire l'archive et supprimer le dossier de la branche
        run: |
          unzip -q github-pages.zip -d temp_dir
          rm -rf "temp_dir/${{ env.BRANCH_NAME }}"
          zip -r github-pages.zip temp_dir/*
          rm -rf temp_dir

      - name: Publier la nouvelle version de l'artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: github-pages.zip

      - name: Supprimer l'ancien artifact
        run: |
          ARTIFACT_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts" | \
            jq -r '.artifacts[] | select(.name == "github-pages") | .id')

          if [ -z "$ARTIFACT_ID" ]; then
            echo "Aucun ancien artifact trouvé à supprimer."
          else
            echo "Suppression de l'artifact ID: $ARTIFACT_ID"
            curl -X DELETE -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID"
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
