name: Cleanup and Republish Artifacts

on:
  pull_request:
    types: [closed]  # Déclenché lorsqu'une PR est fermée ou mergée

permissions:
  actions: read
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest successful artifact
        id: get_artifact
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.ACTIONS_ARTIFACT_TOKEN }}  # Utilisation du token personnel (PAT)
          script: |
            const { owner, repo } = context.repo;
            console.log('Récupération des derniers artefacts');
            
            // Affichage des informations sur le propriétaire et le dépôt
            console.log("Propriétaire du dépôt:", owner);
            console.log("Nom du dépôt:", repo);

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "github-actions.yml",
              status: "success",
              per_page: 1
            });

            // Afficher le nombre d'exécutions récupérées
            console.log("Nombre d'exécutions réussies trouvées:", runs.data.total_count);

            if (runs.data.total_count === 0) {
              console.log("Aucun artefact trouvé. Arrêt du processus.");
              return;
            }

            // Affichage des détails de la première exécution réussie
            const firstRun = runs.data.workflow_runs[0];
            console.log("Détails de la première exécution réussie:");
            console.log("ID de l'exécution:", firstRun.id);
            console.log("Nom de l'exécution:", firstRun.name);

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: firstRun.id
            });

            // Afficher le nombre d'artefacts trouvés
            console.log("Nombre d'artefacts trouvés:", artifacts.data.artifacts.length);

            // Recherche de l'artefact spécifique par son nom
            const artifact = artifacts.data.artifacts.find(a => a.name === "github-pages");

            if (artifact) {
              console.log("Artifact trouvé avec ID :", artifact.id);
              
              const response = await github.rest.actions.downloadArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
                archive_format: 'zip'
              });

              // Sauvegarde du fichier ZIP
              console.log("Téléchargement de l'artefact...");
              const fs = require('fs');
              const path = './github-pages.zip'; // chemin où le fichier sera sauvegardé
              fs.writeFileSync(path, Buffer.from(response.data));

              console.log("Artefact téléchargé et sauvegardé sous github-pages.zip");
              
              // Créer un lien de téléchargement pour l'artefact
              console.log(`L'artefact est sauvegardé ici : ${path}`);
            } else {
              console.log("Aucun artefact trouvé avec le nom 'github-pages'.");
            }



      - name: Delete old artifact and folder
        run: |
          echo "Suppression du dossier associé à la PR fermée ou supprimée"
          branch_name="${{ github.event.pull_request.head.ref }}"
          folder_path="docs/site/${branch_name}"

          # Supprimer le dossier de la branche si il existe
          if [ -d "$folder_path" ]; then
            echo "Suppression du dossier pour la branche ${branch_name}"
            rm -rf "$folder_path"
          else
            echo "Aucun dossier à supprimer pour la branche ${branch_name}"
          fi

      - name: Republish artifact
        run: |
          echo "Décompression et republication de l'artefact"
          
          # Décompression du fichier ZIP
          unzip github-pages.zip -d "/tmp/gh-artifact-extract"
          
          # Extraire le fichier TAR de l'artefact
          tar xvf /tmp/gh-artifact-extract/artifact.tar -C /tmp/gh-artifact-extract/
          
          # Naviguer dans le dossier "." et récupérer le dossier correspondant à la branche fermée ou mergée
          if [ -d "/tmp/gh-artifact-extract/./" ]; then
            echo "Dossier '.' trouvé, récupération du contenu pour la branche ${branch_name}"
            
            # Vérifier si le dossier de la branche existe dans l'artefact
            branch_dir="/tmp/gh-artifact-extract/./${branch_name}"
            if [ -d "$branch_dir" ]; then
              echo "Restauration du contenu pour la branche ${branch_name}"
              
              # Créer le dossier pour la branche dans docs/site
              mkdir -p "docs/site/${branch_name}"
              
              # Copier le contenu du dossier de la branche dans docs/site/
              cp -r "$branch_dir"/* "docs/site/${branch_name}/"
              echo "Contenu de la branche ${branch_name} restauré dans docs/site/"
            else
              echo "Aucun dossier trouvé pour la branche ${branch_name} dans l'artefact."
            fi
          else
            echo "Aucun dossier '.' trouvé dans l'artefact."
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Supprimer entièrement le dossier docs/site avant d'ajouter les nouveaux fichiers
          rm -rf docs/site/*
          
          # Forcer l'ajout même si les fichiers sont dans .gitignore
          git add -f docs/site/
          
          # Vérifier s'il y a des changements avant de commit
          git diff --cached --quiet || git commit -m "Cleanup and republish site for closed PR"
          
          # Pousser en forçant pour éviter les conflits
          git push --force https://x-access-token:${{ secrets.ACTIONS_ARTIFACT_TOKEN }}@github.com/${{ github.repository }}.git



