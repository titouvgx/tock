name: Deploy MkDocs
on:
  pull_request_target:
    types: [closed]  # Se déclenche uniquement quand une PR est fermée ou fusionnée

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest successful artifact
        id: get_artifact
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'github-actions.yml',
              status: "success",
              per_page: 1
            });

            if (runs.data.total_count === 0) {
              console.log("Aucun artefact trouvé.");
              return;
            }

            const run_id = runs.data.workflow_runs[0].id;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === "github-pages");
            if (artifact) {
              console.log("Artifact ID:", artifact.id);
              core.setOutput("artifact_id", artifact.id);
            } else {
              console.log("Aucun artefact 'github-pages' trouvé.");
            }

      - name: Download and extract artifact
        if: steps.get_artifact.outputs.artifact_id
        run: |
          mkdir -p docs/site
          gh run download --repo "${{ github.repository }}" --run-id "${{ steps.get_artifact.outputs.artifact_id }}" --name github-pages --dir docs/site

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Remove directory of closed PR branch
        run: |
          BRANCH_NAME=${{ github.event.pull_request.head.ref }}
          rm -rf docs/site/$BRANCH_NAME
          echo "Dossier supprimé pour la branche fermée : $BRANCH_NAME"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
